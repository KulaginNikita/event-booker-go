<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EventBooker</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: #111a2e;
      --panel-2: #17223a;
      --text: #e7edf8;
      --muted: #91a1bd;
      --line: #263754;
      --blue: #3b82f6;
      --blue-hover: #2563eb;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main { width: min(1120px, calc(100% - 32px)); margin: 28px auto; }
    h1 { margin: 0 0 12px; font-size: 32px; }
    h2 { margin: 0; font-size: 24px; }
    a { color: #93c5fd; font-weight: 700; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 18px;
    }
    .user {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 14px; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      background: #0d1628;
      color: var(--text);
      font-size: 15px;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      color: white;
      background: var(--blue);
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--blue-hover); }
    button:disabled { cursor: not-allowed; opacity: .55; }
    button.secondary { background: #22314f; color: var(--text); }
    button.secondary:hover { background: #2b3e63; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
    .cards { display: grid; gap: 12px; }
    .card {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 8px;
      padding: 14px;
    }
    .title { font-weight: 800; font-size: 18px; margin-bottom: 6px; }
    .meta { color: var(--muted); line-height: 1.5; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .booking {
      border-left: 3px solid var(--line);
      padding: 10px 0 10px 10px;
      margin-top: 10px;
      color: var(--muted);
      background: rgba(255, 255, 255, .02);
    }
    .booking.pending { border-color: var(--yellow); }
    .booking.confirmed { border-color: var(--green); }
    .booking.cancelled { border-color: var(--red); }
    .message { min-height: 22px; color: var(--muted); margin-top: 10px; }
    @media (max-width: 760px) { .user { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <h1>EventBooker</h1>
    <p><a href="/admin">Открыть admin-страницу</a></p>

    <section class="panel">
      <div class="user">
        <label>Имя
          <input id="userName" value="Кирилл Бережной">
        </label>
        <label>Email
          <input id="userEmail" value="kirill@example.com">
        </label>
        <label>Telegram
          <input id="userTelegram" placeholder="chat id или @channel">
        </label>
        <button id="refresh" type="button">Обновить</button>
      </div>
      <div id="message" class="message"></div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <h2>Мероприятия</h2>
        <span id="pollStatus" class="meta"></span>
      </div>
      <div id="events" class="cards"></div>
    </section>
  </main>

  <script>
    const eventsBox = document.querySelector("#events");
    const message = document.querySelector("#message");
    const pollStatus = document.querySelector("#pollStatus");
    const cards = new Map();
    let authToken = "";
    let pollTimer = null;
    let loading = false;

    document.querySelector("#refresh").addEventListener("click", () => loadEvents({ force: true }));

    eventsBox.addEventListener("click", async (event) => {
      const bookBtn = event.target.closest("[data-book]");
      const confirmBtn = event.target.closest("[data-confirm]");
      if (bookBtn) {
        await bookEvent(bookBtn.dataset.book);
      }
      if (confirmBtn) {
        await confirmBooking(confirmBtn.dataset.event, confirmBtn.dataset.confirm);
      }
    });

    async function bookEvent(eventID) {
      await ensureAuthToken();
      const response = await fetch(`/events/${eventID}/book`, {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({
          user_name: document.querySelector("#userName").value,
          user_email: document.querySelector("#userEmail").value,
          user_telegram: document.querySelector("#userTelegram").value
        })
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        message.textContent = body.error || "Не удалось забронировать место.";
        return;
      }
      message.textContent = `Бронь #${body.id} создана. Подтвердите ее до ${new Date(body.expires_at).toLocaleTimeString("ru-RU")}.`;
      await loadEvents({ force: true });
    }

    async function confirmBooking(eventID, bookingID) {
      await ensureAuthToken();
      const response = await fetch(`/events/${eventID}/confirm`, {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ booking_id: Number(bookingID) })
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        message.textContent = body.error || "Не удалось подтвердить бронь.";
        return;
      }
      message.textContent = `Бронь #${body.id} подтверждена.`;
      await loadEvents({ force: true });
    }

    async function loadEvents({ force = false } = {}) {
      if (loading) return;
      loading = true;
      try {
        const listResponse = await fetch("/events?limit=100&sort=starts_at", { cache: "no-store" });
        const list = await listResponse.json();
        const details = [];

        for (const summary of list) {
          const detailResponse = await fetch(`/events/${summary.id}`, { cache: "no-store" });
          details.push(await detailResponse.json());
        }

        renderEvents(details, force);
        syncPolling(details);
      } catch {
        message.textContent = "Не удалось загрузить список мероприятий.";
      } finally {
        loading = false;
      }
    }

    function renderEvents(events, force) {
      if (!events.length) {
        cards.clear();
        eventsBox.innerHTML = `<div class="meta">Мероприятий пока нет. Создайте их в admin-разделе.</div>`;
        return;
      }

      if (eventsBox.querySelector(".meta:only-child")) {
        eventsBox.innerHTML = "";
      }

      const actualIDs = new Set();
      for (const item of events) {
        actualIDs.add(item.id);
        const fingerprint = JSON.stringify(item);
        let card = cards.get(item.id);

        if (!card) {
          card = document.createElement("article");
          card.className = "card";
          card.dataset.id = item.id;
          cards.set(item.id, card);
          eventsBox.appendChild(card);
        }

        if (force || card.dataset.fingerprint !== fingerprint) {
          card.dataset.fingerprint = fingerprint;
          card.innerHTML = eventMarkup(item);
        }
      }

      for (const [id, card] of cards) {
        if (!actualIDs.has(id)) {
          card.remove();
          cards.delete(id);
        }
      }
    }

    function eventMarkup(item) {
      return `
        <div class="title">#${item.id} ${escapeHtml(item.title)}</div>
        <div class="meta">
          Дата: ${new Date(item.starts_at).toLocaleString("ru-RU")}<br>
          Свободно мест: ${item.free_seats} из ${item.capacity}<br>
          Ожидают оплаты: ${item.pending_bookings}; подтверждено: ${item.confirmed_bookings}
        </div>
        <div class="actions">
          <button type="button" data-book="${item.id}" ${item.free_seats <= 0 ? "disabled" : ""}>Забронировать</button>
        </div>
        ${renderBookings(item)}
      `;
    }

    function renderBookings(item) {
      if (!item.bookings || !item.bookings.length) {
        return `<div class="meta">Броней пока нет.</div>`;
      }
      return item.bookings.map((booking) => `
        <div class="booking ${booking.status}">
          #${booking.id} ${escapeHtml(booking.user_name)} - ${statusText(booking.status)}
          ${booking.user_telegram ? `; TG: ${escapeHtml(booking.user_telegram)}` : ""}
          ${booking.status === "pending" ? `до ${new Date(booking.expires_at).toLocaleTimeString("ru-RU")}` : ""}
          ${booking.status === "pending" ? `<button class="secondary" type="button" data-event="${item.id}" data-confirm="${booking.id}">Подтвердить</button>` : ""}
        </div>
      `).join("");
    }

    function syncPolling(events) {
      const hasPending = events.some((event) => event.pending_bookings > 0);
      pollStatus.textContent = hasPending ? "Автообновление включено для pending-броней" : "";

      if (hasPending && !pollTimer) {
        pollTimer = setInterval(() => loadEvents(), 10000);
      }
      if (!hasPending && pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    function statusText(status) {
      switch (status) {
        case "pending": return "ожидает оплаты";
        case "confirmed": return "подтверждена";
        case "cancelled": return "отменена";
        default: return status;
      }
    }

    function escapeHtml(value) {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    async function ensureAuthToken() {
      if (authToken) return;
      const response = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.querySelector("#userName").value || "user",
          role: "user"
        })
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(body.error || "auth failed");
      }
      authToken = body.token;
    }

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${authToken}`
      };
    }

    loadEvents({ force: true });
  </script>
</body>
</html>
