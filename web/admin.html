<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EventBooker Admin</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: #111a2e;
      --panel-2: #17223a;
      --text: #e7edf8;
      --muted: #91a1bd;
      --line: #263754;
      --blue: #3b82f6;
      --blue-hover: #2563eb;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main { width: min(1120px, calc(100% - 32px)); margin: 28px auto; }
    h1 { margin: 0 0 12px; font-size: 32px; }
    h2 { margin: 0; font-size: 24px; }
    a { color: #93c5fd; font-weight: 700; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 18px;
    }
    form {
      display: grid;
      grid-template-columns: 1.4fr 1fr 140px auto;
      gap: 10px;
      align-items: end;
    }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 14px; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      background: #0d1628;
      color: var(--text);
      font-size: 15px;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 11px 16px;
      color: white;
      background: var(--blue);
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--blue-hover); }
    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
    .cards { display: grid; gap: 12px; }
    .card {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 8px;
      padding: 14px;
    }
    .title { font-weight: 800; font-size: 18px; margin-bottom: 6px; }
    .meta { color: var(--muted); line-height: 1.5; }
    .message { min-height: 22px; color: var(--muted); margin-top: 10px; }
    @media (max-width: 760px) { form { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <h1>EventBooker Admin</h1>
    <p><a href="/">Открыть пользовательскую страницу</a></p>

    <section class="panel">
      <form id="eventForm">
        <label>Название
          <input id="title" required placeholder="Go workshop">
        </label>
        <label>Дата
          <input id="startsAt" type="datetime-local" required>
        </label>
        <label>Мест
          <input id="capacity" type="number" min="1" value="10" required>
        </label>
        <button type="submit">Создать</button>
      </form>
      <div id="message" class="message"></div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <h2>Мероприятия</h2>
        <button id="refresh" type="button">Обновить</button>
      </div>
      <div id="events" class="cards"></div>
    </section>
  </main>

  <script>
    const form = document.querySelector("#eventForm");
    const message = document.querySelector("#message");
    const eventsBox = document.querySelector("#events");
    const cards = new Map();
    let pollTimer = null;
    let loading = false;

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const startsAt = new Date(document.querySelector("#startsAt").value);
      const response = await fetch("/events", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title: document.querySelector("#title").value,
          starts_at: startsAt.toISOString(),
          capacity: Number(document.querySelector("#capacity").value)
        })
      });
      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: "create failed" }));
        message.textContent = err.error || "Не удалось создать мероприятие.";
        return;
      }
      form.reset();
      document.querySelector("#capacity").value = 10;
      message.textContent = "Мероприятие создано.";
      await loadEvents({ force: true });
    });

    document.querySelector("#refresh").addEventListener("click", () => loadEvents({ force: true }));

    async function loadEvents({ force = false } = {}) {
      if (loading) return;
      loading = true;
      try {
        const response = await fetch("/events", { cache: "no-store" });
        const events = await response.json();
        renderEvents(events, force);
        syncPolling(events);
      } catch {
        message.textContent = "Не удалось загрузить список мероприятий.";
      } finally {
        loading = false;
      }
    }

    function renderEvents(events, force) {
      if (!events.length) {
        cards.clear();
        eventsBox.innerHTML = `<div class="meta">Мероприятий пока нет.</div>`;
        return;
      }

      if (eventsBox.querySelector(".meta:only-child")) {
        eventsBox.innerHTML = "";
      }

      const actualIDs = new Set();
      for (const item of events) {
        actualIDs.add(item.id);
        const fingerprint = JSON.stringify(item);
        let card = cards.get(item.id);

        if (!card) {
          card = document.createElement("article");
          card.className = "card";
          card.dataset.id = item.id;
          cards.set(item.id, card);
          eventsBox.appendChild(card);
        }

        if (force || card.dataset.fingerprint !== fingerprint) {
          card.dataset.fingerprint = fingerprint;
          card.innerHTML = eventMarkup(item);
        }
      }

      for (const [id, card] of cards) {
        if (!actualIDs.has(id)) {
          card.remove();
          cards.delete(id);
        }
      }
    }

    function eventMarkup(item) {
      return `
        <div class="title">#${item.id} ${escapeHtml(item.title)}</div>
        <div class="meta">
          Дата: ${new Date(item.starts_at).toLocaleString("ru-RU")}<br>
          Всего мест: ${item.capacity}; свободно: ${item.free_seats}<br>
          Ожидают оплаты: ${item.pending_bookings}; подтверждено: ${item.confirmed_bookings}
        </div>
      `;
    }

    function syncPolling(events) {
      const hasPending = events.some((event) => event.pending_bookings > 0);

      if (hasPending && !pollTimer) {
        pollTimer = setInterval(() => loadEvents(), 3000);
      }
      if (!hasPending && pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    function escapeHtml(value) {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    loadEvents({ force: true });
  </script>
</body>
</html>
